<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Contact Form </title>

    <style>
        body {
            font-family: Arial;
            padding: 40px;
            background: #f5f5f5
        }

        .container {
            max-width: 900px;
            margin: auto;
            display: flex;
            gap: 40px
        }

        .left {
            width: 30%
        }

        .right {
            width: 70%
        }

        input,
        select,
        textarea {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 15px;
            outline: none
        }

        .row {
            display: flex;
            gap: 15px
        }

        .priv {
            display: flex;
            gap: 6px;
            font-size: 14px
        }

        .priv p {
            margin: 0
        }

        input[type=checkbox] {
            width: 14px;
            height: 14px;
            margin-top: 3px
        }

        button {
            background: red;
            color: #fff;
            border: none;
            padding: 10px 25px;
            cursor: pointer
        }

        .footer {
            text-align: right;
            margin-top: 15px
        }

        img {
            width: 100%;
            max-width: 300px;
            margin-top: 20px
        }

        span {
            color: red
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="left">
            <h2>Contact Us</h2>
            <p>Let us know how we can help.</p>
            <img src="https://cdn.jotfor.ms/p/products/mobile-forms/assets/img-min/mobile-forms/introduction.svg">
        </div>

        <div class="right">
            <form onsubmit="e(event)">
                <div class="row">
                    <input placeholder="Name" required>
                    <input type="email" placeholder="Email" required>
                </div>

                <select required>
                    <option value="">Type of Inquiry</option>
                    <option> IT </option>
                    <option> General </option>
                    <option> Support </option>
                </select>

                <input type="" placeholder="Company">
                <select>

                    <option>India</option>
                    <option>Russia</option>
                    <option>USA</option>
                    <option>Canada</option>
                    <option>London</option>

                </select>

                <textarea placeholder=" your Message"></textarea>

                <div class="priv">
                    <input type="checkbox" required>
                    <p>Data processed as per <span>Privacy Policy *</span></p>
                </div>

                <div style="border:1px solid #ccc;padding:10px;width:200px;margin:10px 0">
                    <input type="checkbox"> I'm not a robot
                </div>

                <div class="footer">
                    <button>SUBMIT</button>

                </div>
            </form>

        </div>
    </div>

    <script>
        function e(x) { x.preventDefault(); alert("Form submitted successfully") }
    </script>

</body>

</html>
