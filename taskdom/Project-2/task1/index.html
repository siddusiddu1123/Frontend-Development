<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>  Bank Loan EMI Calculator </title>

    <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #757f83, #727a7e);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: #f1f1f1;
        padding: 30px;
        border-radius: 12px;
        width: 350px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        background: #000000;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #255b7a;
    }

    .result {
        margin-top: 20px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
    }
</style>
    
</head>
<body>
    <div class="container">
    <h1>   Bank Loan EMI Calculator   </h1>

    <label>Loan Amount (P):</label>
    <!-- Updated input -->
    <input type="text" id="amount" value="1000000" onkeyup="formatNumber(this)">

    <label>Annual Interest Rate (%):</label>
    <input type="number" id="rate" value="9">

    <label>Tenure (months):</label>
    <input type="number" id="months" value="24">

    <button onclick="calculateEMI()">Calculate EMI</button>

    <div class="result" id="result">
        Monthly EMI: 0
    </div>
</div>

<script>
    function calculateEMI() {
    let P = document.getElementById("amount").value.replace(/,/g, '');
    let annualRate = document.getElementById("rate").value;
    let N = document.getElementById("months").value;

    let R = annualRate / 12 / 100;

    let EMI = (P * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1);

    EMI = EMI.toFixed(2);

    let formattedEMI = Number(EMI).toLocaleString('en-IN');

    document.getElementById("result").innerHTML = "Monthly EMI: ₹ " + formattedEMI;
}

function formatNumber(input) {
    let value = input.value.replace(/,/g, '');
    if (!isNaN(value) && value !== '') {
        input.value = Number(value).toLocaleString('en-IN');
    }
}

</script>

</body>
</html>
