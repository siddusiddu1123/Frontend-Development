<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Menu Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.menu-card{
    width:350px;
    background:#fff;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    overflow:hidden;
}

.menu-header{
    background:#ff5722;
    color:#fff;
    text-align:center;
    padding:20px;
}

.menu-header h1{
    font-size:28px;
    margin-bottom:5px;
}

.menu-header p{
    font-size:14px;
}

.menu-list{
    padding:20px;
}

.menu-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.menu-item:last-child{
    border-bottom:none;
}

.item-name{
    font-size:18px;
    font-weight:bold;
    color:#333;
}

.item-price{
    font-size:18px;
    color:#ff5722;
    font-weight:bold;
}

.menu-footer{
    text-align:center;
    padding:15px;
    background:#f8f8f8;
    font-size:14px;
    color:#666;
}
</style>
</head>

<body>

<div class="menu-card">
    
    <div class="menu-header">
        <h1>🍴 Food Menu</h1>
        <p>Fresh & Delicious</p>
    </div>

    <div class="menu-list">

        <div class="menu-item">
            <span class="item-name">Burger</span>
            <span class="item-price">₹120</span>
        </div>

        <div class="menu-item">
            <span class="item-name">Pizza</span>
            <span class="item-price">₹250</span>
        </div>

        <div class="menu-item">
            <span class="item-name">Pasta</span>
            <span class="item-price">₹180</span>
        </div>

        <div class="menu-item">
            <span class="item-name">Sandwich</span>
            <span class="item-price">₹90</span>
        </div>

        <div class="menu-item">
            <span class="item-name">Cold Coffee</span>
            <span class="item-price">₹110</span>
        </div>

    </div>

    <div class="menu-footer">
        Open Daily | 10 AM - 11 PM
    </div>

</div>

</body>
</html>
