<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #f2f2f2;
        }

        /* Icons */
        .device-icons img {
            width: 25px;
            margin: 0 10px;
            cursor: pointer;
        }

        /* Preview Container */
        .preview-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        /* Default Desktop */
        #previewFrame {
            width: 100%;
            height: 90vh;
            border: none;
            transition: 0.4s;
        }

        /* Mobile Mode */
        .mobile-view {
            width: 375px !important;
            height: 650px;
            border: 12px solid #333;
            border-radius: 30px;
            overflow-y: scroll;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .top-center {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>

</head>

<body>

    <!-- TOP BAR -->
    <div class="top-bar">

        <div>WIX</div>

        <!-- ICONS -->
        <div class="top-center">
            <img src="https://cdn-icons-png.flaticon.com/128/3474/3474360.png" id="desktopBtn" alt="Computer">
            <div> || </div>
            <img src="https://cdn-icons-png.flaticon.com/128/18887/18887773.png" id="mobileBtn" alt="Phone">
        </div>

        <div>
            <span>Click edit and create your own amazing website</span>
            <a href="#">Read More</a>
            <button>Edit this site</button>
        </div>

    </div>

    <!-- WEBSITE PREVIEW -->
    <div class="preview-container">
        <iframe src="index.html" id="previewFrame"></iframe>
    </div>

    <script>
        let frame = document.getElementById("previewFrame");

        document.getElementById("mobileBtn").onclick = () => {
            frame.classList.add("mobile-view");
        };

        document.getElementById("desktopBtn").onclick = () => {
            frame.classList.remove("mobile-view");
        };
    </script>

</body>

</html>
