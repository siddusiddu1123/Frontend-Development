<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>color Generator</title>

    <style>
      .body {
        text-align: center;
        font-family: arial, sans-serif;
        transform: background 0.5s;
      }

      h1 {
        margin-top: 30px;
      }
      .container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 50px;
      }

      .box {
        width: 100px;
        height: 100px;
        cursor: pointer;
        border-radius: 10px;
        box-shadow: 0 0 10px rgb(0, 0, 0);
      }
      .red {
        background-color: red;
      }
      .blue {
        background-color: blue;
      }
      .green {
        background-color: green;
      }
      .orange {
        background-color: orange;
      }
    </style>
  </head>
  <body>
    <h1>Random color Generator</h1>

    <div class="container">
      <div class="box red" onclick="changecolor('red')" /></div>
      <div class="box blue" onclick="changecolor('blue')"></div>
      <div class="box green" onclick="changecolor('green')"></div>
      <div class="box orange" onclick="changecolor('orange')"></div>
    </div>

    <script>
        function changecolor(color) {
            document.body.style.backgroundColor=color;
        }

    </script>
  </body>
</html>
