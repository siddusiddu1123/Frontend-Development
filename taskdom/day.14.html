<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> praroz </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        /* Background */

        .main {
            width: 100%;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
                url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
            background-size: cover;
            background-position: center;
        }

        /* Navbar */

        .navbar {
            width: 85%;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
        }

        .logo {
            color: orange;
            font-size: 35px;
            font-weight: bold;
        }

        .menu ul {
            display: flex;
            list-style: none;
        }

        .menu ul li {
            margin: 0 25px;
        }

        .menu ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        /* Content */

        .content {
            color: white;
            width: 85%;
            margin: auto;
            margin-top: 150px;
        }

        .content h1 {
            font-size: 60px;
        }

        .content span {
            color: orange;
            font-size: 70px;
            font-weight: bold;
        }

        .content p {
            margin-top: 20px;
            width: 500px;
            line-height: 1.6;
        }

        /* Button */

        .btn {
            margin-top: 25px;
            display: inline-block;
            background: orange;
            padding: 12px 30px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>

</head>

<body>

    <div class="main">

        <div class="navbar">

            <div class="logo">PraRoz</div>

            <div class="menu">
                <ul>
                    <li><a href="#">HOME</a></li>
                    <li><a href="#">ABOUT</a></li>
                    <li><a href="#">SERVICE</a></li>
                    <li><a href="#">DESIGN</a></li>
                    <li><a href="#">CONTACT</a></li>
                </ul>
            </div>

        </div>

        <div class="content">

            <h1>
                Web Design & <br>
                <span>Development</span><br>
                Course
            </h1>

            <p>
                Web Design is a specialisation of the design stream. They also use HTML,
                CSS, WYSIWYG editing software, mark up validators etc
                to create design elements.
            </p>

            <a href="#" class="btn">JOIN US</a>

        </div>

    </div>

</body>

</html>
</head>

</body>

</html>
