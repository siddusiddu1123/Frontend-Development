<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> GPS Tracker </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url("https://img.magnific.com/premium-psd/golden-balloons-with-glittering-stars-transparent-background_1059676-44115.jpg") center/cover no-repeat fixed;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .wrapper {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .4);
        }

        .main-heading {
            color: #000;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, .5);
            letter-spacing: 1px;
        }

        #map {
            width: 100%;
            height: 420px;
            border-radius: 25px;
            overflow: hidden;
            border: 4px solid rgba(255, 255, 255, .5);
            box-shadow: 0 0 35px rgba(255, 255, 255, .7);
        }

        .pin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: #fff;
            z-index: 10;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from {
                transform: translate(-50%, -50%) translateY(0);
            }

            to {
                transform: translate(-50%, -50%) translateY(-15px);
            }
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 3px solid rgba(255, 255, 255, .8);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .ring:nth-child(2) {
            animation-delay: .6s;
        }

        .ring:nth-child(3) {
            animation-delay: 1.2s;
        }

        @keyframes pulse {
            0% {
                width: 20px;
                height: 20px;
                opacity: 1;
            }

            100% {
                width: 180px;
                height: 180px;
                opacity: 0;
            }
        }

        .card {
            background: rgba(0, 0, 0, .65);
            border: 1px solid #10b981;
            border-radius: 22px;
            padding: 22px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .4);
            transition: .3s;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(16, 185, 129, .35);
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: red;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: .2;
            }
        }

        .track-btn {
            background: linear-gradient(45deg, #10b981, #059669);
            padding: 16px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: bold;
            width: 100%;
            color: #fff;
            box-shadow: 0 12px 30px rgba(16, 185, 129, .45);
            transition: .3s;
        }

        .track-btn:hover {
            transform: scale(1.03);
            background: linear-gradient(45deg, #059669, #047857);
        }

        .label {
            color: #10b981;
            font-weight: bold;
        }

        .value {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>

<body class="p-5 text-white">

    <div class="max-w-4xl mx-auto wrapper">

        <h1 class="text-5xl font-bold text-center mb-3 main-heading">
            <i class="fas fa-location-dot"></i> My GPS Tracker
        </h1>

        <p class="text-center text-black font-bold mb-6">
            Luxury Live Tracking • Google Maps
        </p>

        <div class="relative">
            <div id="map"></div>

            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>

            <div class="pin">
                <i class="fas fa-map-marker-alt"></i>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-5 mt-6">

            <div class="card">
                <h2 class="text-2xl text-emerald-400 font-bold mb-4">
                    <i class="fas fa-map"></i> Coordinates
                </h2>

                <p><span class="label">Latitude:</span> <span id="lat" class="value">0</span></p>
                <p class="mt-2"><span class="label">Longitude:</span> <span id="lng" class="value">0</span></p>
                <p class="mt-2"><span class="label">Accuracy:</span> <span id="acc" class="value">0</span> m</p>
            </div>

            <div class="card">
                <h2 class="text-2xl text-emerald-400 font-bold mb-4">
                    <i class="fas fa-mobile-screen"></i> Device
                </h2>

                <div id="device"></div>
            </div>

        </div>

        <div class="card mt-5 flex items-center gap-4">
            <div class="dot"></div>
            <div id="status" class="text-lg font-bold text-emerald-400">
                GPS READY
            </div>
        </div>

        <button onclick="trackLocation()" class="track-btn mt-6">
            <i class="fas fa-satellite"></i> START TRACKING
        </button>

    </div>

    <script>
        function deviceInfo() {
            let ua = navigator.userAgent;
            let name = "Desktop";

            if (/Android/i.test(ua)) name = "Android";
            if (/iPhone/i.test(ua)) name = "iPhone";
            if (/Windows/i.test(ua)) name = "Windows PC";
            if (/Mac/i.test(ua)) name = "Mac";

            document.getElementById("device").innerHTML = `
<p><span class="label">Device:</span> ${name}</p>
<p class="mt-2"><span class="label">Screen:</span> ${screen.width} × ${screen.height}</p>
`;
        }

        function loadMap(lat, lng) {
            document.getElementById("map").innerHTML = `
<iframe
width="100%"
height="100%"
style="border:0"
src="https://maps.google.com/maps?q=${lat},${lng}&z=18&output=embed">
</iframe>`;
        }

        function trackLocation() {
            document.getElementById("status").innerText = "Searching GPS...";

            navigator.geolocation.getCurrentPosition(pos => {

                let lat = pos.coords.latitude.toFixed(6);
                let lng = pos.coords.longitude.toFixed(6);
                let acc = Math.round(pos.coords.accuracy);

                document.getElementById("lat").innerText = lat;
                document.getElementById("lng").innerText = lng;
                document.getElementById("acc").innerText = acc;

                loadMap(lat, lng);

                document.getElementById("status").innerText = "LIVE TRACKING ACTIVE";

            }, () => {
                alert("Allow Location Permission");
            });
        }

        deviceInfo();
        loadMap(17.3850, 78.4867);
    </script>

</body>

</html>
