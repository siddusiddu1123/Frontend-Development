<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Tasks - Different Method</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        }

        .box {
            width: 420px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #heading {
            margin-bottom: 20px;
        }

        #time,
        #result {
            font-size: 28px;
            margin: 15px 0;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="box">

        <h1 id="heading">Hello User</h1>

        <input type="text" id="textBox" placeholder="Enter Name">
        <button id="btn1">Set Heading</button>

        <br><br>

        <button id="btn2">Change Background</button>

        <div id="time">00:00:00</div>
        <button id="btn3">Show Time</button>

        <div id="result">0</div>

        <button id="plus">Increase</button>
        <button id="minus">Decrease</button>

        <br><br>

        <button id="reset">Reset</button>

    </div>

    <script>

        // Select Elements
        let heading = document.getElementById("heading");
        let textBox = document.getElementById("textBox");
        let time = document.getElementById("time");
        let result = document.getElementById("result");

        let count = 0;

        // 1 Using addEventListener
        document.getElementById("btn1").addEventListener("click", function () {

            heading.innerText = textBox.value;

        });

        // 2 Change Background
        document.getElementById("btn2").addEventListener("click", function () {

            document.body.style.background = "orange";

        });

        // 3 Show Time
        document.getElementById("btn3").addEventListener("click", function () {

            setInterval(function () {

                time.innerText = new Date().toLocaleTimeString();

            }, 1000);

        });

        // 4 Counter
        document.getElementById("plus").addEventListener("click", function () {

            count++;
            result.innerText = count;

        });

        document.getElementById("minus").addEventListener("click", function () {

            count--;
            result.innerText = count;

        });

        // 5 Reset
        document.getElementById("reset").addEventListener("click", function () {

            heading.innerText = "Hello User";
            textBox.value = "";
            time.innerText = "00:00:00";
            count = 0;
            result.innerText = count;

            document.body.style.background =
                "linear-gradient(135deg,#ff9a9e,#fad0c4)";

        });

    </script>

</body>

</html>
