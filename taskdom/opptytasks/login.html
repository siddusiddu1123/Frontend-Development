<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> NEXUS GLOBAL </title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        /* BACKGROUND */
        .main-bg {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            background: linear-gradient(270deg, #0d1b4d, #1a2f7a, #0d1b4d);
            background-size: 400% 400%;
            animation: bgMove 10s infinite alternate;
        }

        @keyframes bgMove {
            0% {
                background-position: left;
            }

            100% {
                background-position: right;
            }
        }

        /* FLOATING GLOW */
        .main-bg::before,
        .main-bg::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            filter: blur(120px);
            opacity: 0.4;
        }

        .main-bg::before {
            background: orange;
            top: -100px;
            left: -100px;
            animation: float 8s infinite alternate;
        }

        .main-bg::after {
            background: #3498db;
            bottom: -100px;
            right: -100px;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(60px, 60px);
            }
        }

        /* LOGO */
        .logo {
            background: white;
            color: #333;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 60px;
            font-size: 22px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: fadeDown 1s ease;
        }

        .logo span {
            color: orange;
        }

        /* CARD CONTAINER */
        .card-container {
            display: flex;
            gap: 30px;
        }

        /* CARD */
        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 260px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            transition: 0.4s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: fadeUp 1s ease;
        }

        /* HOVER EFFECT */
        .card:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
        }

        /* RIPPLE EFFECT */
        .card::after {
            content: "";
            position: absolute;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: 0.5s;
        }

        .card:active::after {
            width: 300px;
            height: 300px;
        }

        /* ICON */
        .icon {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }

        /* ICON COLORS */
        .orange {
            background: radial-gradient(circle, #ff8c00, #ff3c00);
            animation: pulseOrange 2s infinite;
        }

        .blue {
            background: radial-gradient(circle, #00aaff, #004cff);
            animation: pulseBlue 2s infinite;
        }

        /* PULSE */
        @keyframes pulseOrange {

            0%,
            100% {
                box-shadow: 0 0 15px #ff6a00;
            }

            50% {
                box-shadow: 0 0 35px #ff6a00;
            }
        }

        @keyframes pulseBlue {

            0%,
            100% {
                box-shadow: 0 0 15px #007bff;
            }

            50% {
                box-shadow: 0 0 35px #007bff;
            }
        }

        /* TEXT */
        h3 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        p {
            font-size: 14px;
            opacity: 0.8;
        }

        /* BUTTON */
        .btn {
            border: 1px solid rgba(255, 255, 255, 0.6);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin: 25px auto 0;
            line-height: 35px;
            transition: 0.3s;
        }

        .card:hover .btn {
            background: white;
            color: black;
            transform: scale(1.1);
        }

        /* LOADER */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0d1b4d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: 0.5s;
        }

        #loader.active {
            opacity: 1;
            pointer-events: all;
        }

        /* LOADER TEXT */
        .loader-content h1 {
            font-size: 42px;
            letter-spacing: 2px;
            animation: pulseText 1.5s infinite;
        }

        .loader-content span {
            color: orange;
        }

        /* SPINNER */
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid orange;
            border-radius: 50%;
            margin-top: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* ANIMATIONS */
        @keyframes pulseText {

            0%,
            100% {
                opacity: 0.5;
                transform: scale(0.95);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RESPONSIVE */
        @media(max-width: 768px) {
            .card-container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="main-bg">

        <div class="logo">NEXUS<span>GLOBAL</span></div>

        <div class="card-container">

            <div class="card">
                <div class="icon orange">🔒</div>
                <h3>Employee Login</h3>
                <p>Clock-in safely</p>
                <div class="btn">→</div>
            </div>

            <div class="card">
                <div class="icon blue">👤</div>
                <h3>Admin Login</h3>
                <p>Access reports</p>
                <div class="btn">→</div>
            </div>

        </div>

    </div>

    <!-- LOADER -->
    <div id="loader">
        <div class="loader-content">
            <h1>NEXUS <span>GLOBAL</span></h1>
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        const loader = document.getElementById("loader");

        document.querySelectorAll('.card').forEach(card => {
            card.onclick = () => {
                loader.classList.add("active");

                setTimeout(() => {
                    window.location.href = "login_form.html";
                }, 3000);
            };
        });
    </script>

</body>
</html>
