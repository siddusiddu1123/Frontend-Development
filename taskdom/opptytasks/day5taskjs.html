<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Template</title>
    <style>
        body {
            background-color: #000000;
            /* Matching the blue background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: #333;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 60px;
            background-color: #c0c0c0;
            border: none;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: right;
            padding: 10px;
            font-size: 24px;
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #fff;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        /* Styling for the orange buttons */
        .operator-orange {
            background-color: #f39c12;
            color: white;
        }

        .operator-orange:hover {
            background-color: #d68910;
        }

        /* Spanning the Clear button if you want it (Optional) */
        .clear-btn {
            grid-column: span 4;
            background-color: #ff5e5e;
            color: white;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <input type="text" id="display" disabled>
        <div class="buttons">
            <!-- Row 1 -->
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('*')">X</button>

            <!-- Row 2 -->
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('/')">÷</button>

            <!-- Row 3 -->
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="append('-')">-</button>

            <!-- Row 4 -->
            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button class="operator-orange" onclick="calculate()">=</button>
            <button class="operator-orange" onclick="append('+')">+</button>

            <!-- Clear Button -->
            <button class="clear-btn" onclick="clearDisplay()">C</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function append(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
        }

        function calculate() {
            try {
                // eval() evaluates the string as math. 
                // Replace X and ÷ with JS operators first
                let expression = display.value;
                display.value = eval(expression);
            } catch (error) {
                display.value = 'Error';
            }
        }
    </script>

</body>

</html>
