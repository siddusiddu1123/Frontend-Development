<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS GLOBAL Login</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        /* BACKGROUND */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(270deg, #0d1b4d, #1a2f7a, #0d1b4d);
            background-size: 400% 400%;
            animation: bgMove 10s infinite alternate;
            overflow: hidden;
        }

        /* GLOW LIGHTS */
        body::before,
        body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            filter: blur(120px);
            opacity: 0.4;
        }

        body::before {
            background: #ff6a00;
            top: -100px;
            left: -100px;
            animation: float 8s infinite alternate;
        }

        body::after {
            background: #3498db;
            bottom: -100px;
            right: -100px;
            animation: float 10s infinite alternate;
        }

        /* ANIMATIONS */
        @keyframes bgMove {
            0% {
                background-position: left;
            }

            100% {
                background-position: right;
            }
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(60px, 60px);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* CARD */
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            width: 360px;
            padding: 40px;
            color: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeUp 1s ease;
        }

        /* LOGO */
        .logo {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .logo span {
            color: orange;
        }

        /* TEXT */
        h2 {
            text-align: center;
            margin-bottom: 5px;
        }

        p {
            text-align: center;
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        /* INPUT GROUP */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: white;
            outline: none;
        }

        .input-group label {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            transition: 0.3s;
            pointer-events: none;
        }

        /* FLOAT LABEL */
        .input-group input:focus+label,
        .input-group input:not(:placeholder-shown)+label {
            top: -8px;
            font-size: 11px;
            color: orange;
        }

        /* INPUT FOCUS EFFECT */
        .input-group input:focus {
            border-color: orange;
            box-shadow: 0 0 10px rgba(255, 165, 0, 0.5);
        }

        /* ROW */
        .row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin: 10px 0 20px;
        }

        .row a {
            color: orange;
            text-decoration: none;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(45deg, #ff6a00, #ff3c00);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* BUTTON HOVER */
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 100, 0, 0.6);
        }

        /* LOADING STATE */
        button.loading {
            pointer-events: none;
            background: gray;
        }

        button.loading::after {
            content: "";
            width: 20px;
            height: 20px;
            border: 3px solid white;
            border-top: 3px solid transparent;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* RESPONSIVE */
        @media(max-width: 400px) {
            .card {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo">NEXUS<span>GLOBAL</span></div>

        <h2>Welcome Back</h2>
        <p>Please login to your account</p>

        <form>

            <div class="input-group">
                <input type="email" required placeholder=" ">
                <label>Email Address</label>
            </div>

            <div class="input-group">
                <input type="password" required placeholder=" ">
                <label>Password</label>
            </div>

            <div class="row">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="button" id="signin">Sign In</button>

        </form>
    </div>

    <script>
        const btn = document.getElementById('signin');

        btn.onclick = () => {
            btn.classList.add("loading");

            setTimeout(() => {
                window.location.href = "day13taskjs.html";
            }, 2000);
        };
    </script>

</body>

</html>
