<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global University Course Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --accent: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 1rem 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        @media (min-width: 1024px) {
            .header-content {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }

        .logo-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3a8a;
            white-space: nowrap;
        }

        .logo-sub {
            color: var(--accent);
            font-size: 0.875rem;
            font-weight: 400;
            display: none;
        }

        @media (min-width: 640px) {
            .logo-sub { display: inline; }
        }

        .badge-count {
            background: #eff6ff;
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid #dbeafe;
        }

        /* Search */
        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
        }

        .search-wrapper svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            padding: 0.65rem 1rem 0.65rem 2.75rem;
            background: #f1f5f9;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            transition: all 0.2s;
            font-size: 1rem;
        }

        #searchInput:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Grid */
        main {
            padding: 2rem 0;
            flex-grow: 1;
        }

        #courseGrid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 640px) {
            #courseGrid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 1024px) {
            #courseGrid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (min-width: 1280px) {
            #courseGrid { grid-template-columns: repeat(4, 1fr); }
        }

        /* Course Card */
        .course-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .dept-tag {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .status-tag {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.125rem 0.5rem;
            border-radius: 6px;
            border: 1px solid transparent;
        }

        .status-open { background: #ecfdf5; color: #059669; border-color: #d1fae5; }
        .status-full { background: #fff1f2; color: #e11d48; border-color: #ffe4e6; }

        .course-title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .faculty-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .card-footer {
            margin-top: auto;
            padding-top: 1.25rem;
            border-top: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .capacity-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .capacity-value {
            font-size: 0.875rem;
            font-weight: 700;
        }

        .capacity-red { color: var(--error); }

        .btn-enroll {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-enroll:hover {
            background: var(--primary-hover);
        }

        .btn-enroll:active {
            transform: scale(0.95);
        }

        .btn-enroll:disabled {
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            border: 1px solid var(--border);
        }

        /* Status Area & Loader */
        #statusArea {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            display: none;
        }

        #statusArea.active { display: flex; align-items: center; justify-content: center; gap: 0.75rem; }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error state */
        #errorContainer {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1rem;
            text-align: center;
        }

        #errorContainer.active { display: flex; }

        .error-icon {
            background: #fef2f2;
            color: var(--error);
            padding: 1.5rem;
            border-radius: 50%;
            margin-bottom: 1.5rem;
        }

        .btn-reset {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: var(--radius);
            font-weight: 700;
            cursor: pointer;
            margin-top: 2rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 1rem;
        }

        @media (min-width: 640px) {
            .modal-overlay { align-items: center; }
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
        .modal-body { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 2rem; }
        .modal-actions { display: flex; flex-direction: column; gap: 0.75rem; }

        .btn-confirm { background: var(--primary); color: white; border: none; padding: 0.875rem; border-radius: 0.75rem; font-weight: 700; cursor: pointer; }
        .btn-cancel { background: #f1f5f9; color: var(--text-main); border: none; padding: 0.875rem; border-radius: 0.75rem; font-weight: 700; cursor: pointer; }

        footer {
            padding: 2.5rem 0;
            border-top: 1px solid var(--border);
            background: white;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo-group">
                <h1>EduStream <span class="logo-sub">University Portal</span></h1>
                <span id="courseCount" class="badge-count">0 Courses</span>
            </div>
            
            <div class="search-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="Search courses, faculty, or departments...">
            </div>
        </div>
    </header>

    <main class="container">
        <div id="statusArea">
            <div class="loader"></div>
            <span>Updating academic catalog...</span>
        </div>

        <div id="courseGrid">
            <!-- Courses rendered here -->
        </div>

        <div id="errorContainer">
            <div class="error-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            </div>
            <h2 id="errorMessage" style="font-weight: 700; margin-bottom: 0.5rem;">No results found</h2>
            <p style="color: var(--text-muted); max-width: 320px;">Try adjusting your search terms or refresh the catalog.</p>
            <button onclick="resetSearch()" class="btn-reset">Refresh Catalog</button>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Global University Integrated Systems. <br>Real-time enrollment enabled.</p>
        </div>
    </footer>

    <script>
        let ALL_COURSES = [];
        const DOM = {
            grid: document.getElementById('courseGrid'),
            searchInput: document.getElementById('searchInput'),
            count: document.getElementById('courseCount'),
            status: document.getElementById('statusArea'),
            errorContainer: document.getElementById('errorContainer'),
            errorMessage: document.getElementById('errorMessage')
        };

        async function fetchCourses() {
            showLoading(true);
            toggleError(false);
            
            try {
                await new Promise(resolve => setTimeout(resolve, 600));

                const mockData = [
                    { id: 101, title: "Neural Networks 101", dept: "Computer Science", seats: 12, max: 50, faculty: "Dr. Aris" },
                    { id: 102, title: "Modernist Literature", dept: "English", seats: 0, max: 30, faculty: "Prof. Sterling" },
                    { id: 103, title: "Macroeconomics", dept: "Business", seats: 45, max: 100, faculty: "Prof. Zhang" },
                    { id: 104, title: "Inorganic Chemistry", dept: "Science", seats: 5, max: 40, faculty: "Dr. Kovac" },
                    { id: 105, title: "UI/UX Design Systems", dept: "Digital Arts", seats: 2, max: 15, faculty: "Prof. Miller" },
                    { id: 106, title: "Criminal Law Foundations", dept: "Law", seats: 25, max: 30, faculty: "Judge Rehnquist" },
                    { id: 107, title: "Astrophysics II", dept: "Science", seats: 0, max: 12, faculty: "Dr. Tyson" },
                    { id: 108, title: "Public Health Policy", dept: "Medicine", seats: 80, max: 120, faculty: "Dr. Fauci" }
                ];

                if (Math.random() < 0.05) throw new Error("The academic server is currently busy.");

                ALL_COURSES = mockData;
                renderDisplay(ALL_COURSES);

            } catch (error) {
                handleGlobalError(error.message);
            } finally {
                showLoading(false);
            }
        }

        function renderDisplay(courses) {
            DOM.grid.innerHTML = "";
            DOM.count.textContent = `${courses.length} Course${courses.length === 1 ? '' : 's'}`;

            if (courses.length === 0) {
                handleGlobalError("No courses found matching your search.");
                return;
            }

            toggleError(false);

            courses.forEach(course => {
                const isFull = course.seats <= 0;
                const card = document.createElement('div');
                card.className = "course-card";
                
                card.innerHTML = `
                    <div style="flex-grow: 1;">
                        <div class="card-header">
                            <span class="dept-tag">${course.dept}</span>
                            <span class="status-tag ${isFull ? 'status-full' : 'status-open'}">
                                ${isFull ? 'FULL' : 'OPEN'}
                            </span>
                        </div>
                        <h3 class="course-title">${course.title}</h3>
                        <p class="faculty-info">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            ${course.faculty}
                        </p>
                    </div>
                    
                    <div class="card-footer">
                        <div>
                            <p class="capacity-label">Capacity</p>
                            <p class="capacity-value ${isFull ? 'capacity-red' : ''}">
                                ${isFull ? 'Waitlist' : `${course.seats} / ${course.max}`}
                            </p>
                        </div>
                        <button 
                            ${isFull ? 'disabled' : ''} 
                            onclick="enroll('${course.title.replace(/'/g, "\\'")}')"
                            class="btn-enroll"
                        >
                            ${isFull ? 'Locked' : 'Enroll Now'}
                        </button>
                    </div>
                `;
                DOM.grid.appendChild(card);
            });
        }

        const handleSearch = (e) => {
            const query = e.target.value.trim().toLowerCase();
            const filtered = ALL_COURSES.filter(c => 
                c.title.toLowerCase().includes(query) || 
                c.dept.toLowerCase().includes(query) ||
                c.faculty.toLowerCase().includes(query)
            );
            renderDisplay(filtered);
        };

        function resetSearch() {
            DOM.searchInput.value = "";
            fetchCourses();
        }

        function enroll(name) {
            const modal = document.createElement('div');
            modal.className = "modal-overlay";
            modal.innerHTML = `
                <div class="modal-content">
                    <h4 class="modal-title">Confirm Enrollment</h4>
                    <p class="modal-body">You are applying for <strong>${name}</strong>. Proceed to student verification?</p>
                    <div class="modal-actions">
                        <button onclick="this.closest('.modal-overlay').remove()" class="btn-confirm">Verify & Continue</button>
                        <button onclick="this.closest('.modal-overlay').remove()" class="btn-cancel">Cancel</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function showLoading(active) {
            active ? DOM.status.classList.add('active') : DOM.status.classList.remove('active');
        }

        function toggleError(show) {
            if (show) {
                DOM.grid.style.display = 'none';
                DOM.errorContainer.classList.add('active');
            } else {
                DOM.grid.style.display = 'grid';
                DOM.errorContainer.classList.remove('active');
            }
        }

        function handleGlobalError(msg) {
            DOM.errorMessage.textContent = msg;
            toggleError(true);
        }

        DOM.searchInput.addEventListener('input', handleSearch);
        window.onload = fetchCourses;
    </script>
</body>
</html>
