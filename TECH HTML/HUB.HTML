<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: sans-serif
        }

        h1 {
            text-align: center;
            padding: 30px 10px;
            font-weight: 400
        }

        .box {
            display: flex;
            gap: 25px;
            justify-content: center;
            padding: 20px
        }

        .card {
            width: 300px;
            background: #3a3a3a
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover
        }

        .text {
            padding: 20px
        }

        .text h2 {
            margin: 0 0 10px;
            font-weight: 400
        }

        .text p {
            color: #ccc;
            font-size: 14px
        }

        .arrow {
            float: right;
            background: #3b82f6;
            color: #fff;
            padding: 8px 12px;
            border-radius: 50%;
            text-decoration: none
        }
    </style>
</head>

<body>

    <h1>cutting edge solutions to power up your business</h1>

    <div class="box">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab">
            <div class="text">
                <h2>Industries</h2>
                <p>Select your industry. Discover our imapact.</p>
                <a href="#" class="arrow">&rarr;</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
            <div class="text">
                <h2>Services</h2>
                <p>Experience our Services. Transform your business</p>
                <a href="#" class="arrow">&rarr;</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
            <div class="text">
                <h2>Products and platforms</h2>
                <p>Explore our products. Accelerate your performance.</p>
                <a href="#" class="arrow">&rarr;</a>
            </div>
        </div>
    </div>

</body>

</html>
